  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function genCode() {
    return Math.random().toString(36).substring(2, 7).toUpperCase();
  }

    room: null,

  let roomListener = null;
  let answerListener = null;
  let advanceQueued = false;

  function listenToRoom(code) {
    if (roomListener) roomListener();
    const roomRef = ref(db, `rooms/${code}`);
    roomListener = onValue(roomRef, (snapshot) => {
      const room = snapshot.val();
      if (!room) return;
      state.room = room;

      // Guest: detect when host has set up questions and move to question screen
      if (state.screen === 'waiting_guest' && room.questions) {
        state.screen = 'question';
        state.currentIdx = 0;
        state.submitted = false;
        state.selectedOpt = null;
        listenToAnswer(code, 0);
      }

      // Host: detect guest joined
      if (state.screen === 'waiting_host' && room.guestName) {
        state.screen = 'question';
        state.currentIdx = 0;
        state.submitted = false;
        state.selectedOpt = null;
        listenToAnswer(code, 0);
      }

      render();
    });
  }

  function listenToAnswer(code, idx) {
    if (answerListener) { answerListener(); answerListener = null; }
    advanceQueued = false;
    const ansRef = ref(db, `rooms/${code}/answers/q${idx}`);
    answerListener = onValue(ansRef, (snapshot) => {
      const ans = snapshot.val();
      if (!ans) return;
      // Update local room answers
      if (state.room) {
        if (!state.room.answers) state.room.answers = {};
        state.room.answers[`q${idx}`] = ans;
      }
      // If both answered and not already advancing
      if (ans.hostAnswer && ans.guestAnswer && !advanceQueued) {
        advanceQueued = true;
        render(); // show "both answered" state immediately
        setTimeout(() => {
          const totalQ = state.room?.questions?.length || 0;
          if (idx + 1 >= totalQ) {
            state.screen = 'reveal';
          } else {
            state.currentIdx = idx + 1;
            state.submitted = false;
            state.selectedOpt = null;
            state.otherText = '';
            listenToAnswer(code, idx + 1);
          }
          render();
        }, 1500);
      } else {
        render();
      }
    });
  }

  async function createRoom() {
    const nameEl = document.getElementById('myName');
    const name = nameEl ? nameEl.value.trim() : '';
    if (!name) { showError('Enter your name first'); return; }
    const code = genCode();
    const questions = shuffle(ALL_QUESTIONS).slice(0, state.qCount);
    const roomData = {
      code,
      hostName: name,
      guestName: '',
      questions,
      answers: {},
      createdAt: Date.now(),
    };
    await set(ref(db, `rooms/${code}`), roomData);
    state.myName = name;
    state.roomCode = code;
    state.role = 'host';
    state.room = roomData;
    state.screen = 'waiting_host';
    listenToRoom(code);
    render();

  }

  async function joinRoom() {
    const nameEl = document.getElementById('myName');
    const codeEl = document.getElementById('joinCode');
    const name = nameEl ? nameEl.value.trim() : '';
    const code = codeEl ? codeEl.value.trim().toUpperCase() : '';
    if (!name) { showError('Enter your name first'); return; }
    if (!code) { showError('Enter the room code'); return; }
    const snapshot = await get(ref(db, `rooms/${code}`));
    if (!snapshot.exists()) { showError('Room not found. Check the code.'); return; }
    const room = snapshot.val();
    if (room.guestName) { showError('Room is already full.'); return; }
    await update(ref(db, `rooms/${code}`), { guestName: name });
    state.myName = name;
    state.roomCode = code;
    state.role = 'guest';
    state.room = { ...room, guestName: name };
    state.screen = 'question';
    state.currentIdx = 0;
    state.submitted = false;
    state.selectedOpt = null;
    listenToRoom(code);
    listenToAnswer(code, 0);
    render();
  }

  async function submitAnswer() {
    if (state.selectedOpt === null) return;
    const room = state.room;
    const questions = room.questions;

    updateObj[`answers/${qKey}/question`] = q.q;
    updateObj[`answers/${qKey}/cat`] = q.cat;
    await update(ref(db, `rooms/${state.roomCode}`), updateObj);
    state.submitted = true;
    // Make sure answer listener is active for this question
    listenToAnswer(state.roomCode, state.currentIdx);
    render();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }

  function setQCount(n) {
    state.qCount = n;
    render();
  }

  function restart() {
    if (roomListener) roomListener();
    if (answerListener) answerListener();
    answerListener = null;
    advanceQueued = false;
    state = { screen: 'home', roomCode: '', role: '', myName: '', qCount: 20, currentIdx: 0, selectedOpt: null, otherText: '', submitted: false, room: null };
    render();
  }

  function selectOpt(i) {
    state.selectedOpt = i;
    render();
  }

  function render() {
    const root = document.getElementById('app');
    root.innerHTML = '';

    const s = state;
    const room = s.room;

    if (s.screen === 'home') {
      root.innerHTML = `
        <div class="splash">
          <div class="eyebrow">✦ First Date Edition ✦</div>
          <div class="bigtitle">The <em>Unfiltered</em><br>Quiz</div>
          <div class="sub">100+ questions. No filter. Each person plays on their own phone. Answers reveal only after you've both locked in.</div>
          <div class="setup">
            <input class="inp" id="myName" placeholder="Your name" maxlength="20" />
            <div class="section-label">Questions</div>
            <div class="row">
              ${[20,50,100].map(n => `<button class="cnt-btn ${s.qCount===n?'active':''}" onclick="setQCount(${n})">${n}</button>`).join('')}
            </div>
            <div id="errorMsg" class="error" style="display:none"></div>
            <button class="btn-primary" onclick="createRoom()">Create Room →</button>
            <div class="divider-text">or join one</div>
            <div class="row">
              <input class="inp code-inp" id="joinCode" placeholder="ENTER CODE" maxlength="5" style="text-transform:uppercase;letter-spacing:4px;text-align:center;" />
              <button class="btn-join" onclick="joinRoom()">Join →</button>
            </div>
          </div>
        </div>`;
    }

    else if (s.screen === 'waiting_host') {
      root.innerHTML = `
        <div class="splash">
          <div class="eyebrow">Room Created</div>
          <div class="bigtitle">Send them<br><em>this code</em></div>
          <div class="sub">They open this link, enter their name, and type the code below.</div>
          <div class="code-box">
            <div class="code-label">Room Code</div>
            <div class="big-code">${s.roomCode}</div>
          </div>
          <div class="waiting-msg"><span class="dot"></span> Waiting for your date to join...</div>
        </div>`;
    }

    else if (s.screen === 'waiting_guest') {
      root.innerHTML = `
        <div class="splash">
          <div class="eyebrow">Joined!</div>
          <div class="bigtitle">You're in.<br><em>Hold tight.</em></div>
          <div class="sub">Waiting for ${room?.hostName || 'them'} to start the game...</div>
          <div class="waiting-msg"><span class="dot"></span> Connecting...</div>
        </div>`;
    }

    else if (s.screen === 'question') {
      const questions = room?.questions || [];
      const q = questions[s.currentIdx];
      if (!q) return;
      const total = questions.length;
      const progress = (s.currentIdx / total) * 100;
      const myKey = s.role === 'host' ? 'hostAnswer' : 'guestAnswer';
      const otherKey = s.role === 'host' ? 'guestAnswer' : 'hostAnswer';
      const ans = room?.answers?.[`q${s.currentIdx}`];
      const iAnswered = !!(ans?.[myKey]);
      const theyAnswered = !!(ans?.[otherKey]);
      const otherName = s.role === 'host' ? room?.guestName : room?.hostName;
      const labels = ['A','B','C','D'];

      root.innerHTML = `
        <div class="quiz-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="quiz-meta">
            <div class="q-counter">Q ${s.currentIdx+1} / ${total}</div>
            <div class="cat-tag">${q.cat}</div>
          </div>
          <div class="question-card">
            <div class="q-text">${q.q}</div>
            ${!s.submitted ? `
              <div class="options">
                ${q.opts.map((opt,i) => `
                  <button class="opt-btn ${s.selectedOpt===i?'selected':''}" onclick="selectOpt(${i})">
                    <span class="opt-label">${labels[i]}</span>
                    <span>${opt === 'Other' ? 'Other:' : opt}</span>
                  </button>
                  ${opt === 'Other' && s.selectedOpt === i ? `<input class="other-inp" id="otherInp" placeholder="write it in..." value="${s.otherText}" oninput="state.otherText=this.value" onclick="event.stopPropagation()" />` : ''}
                `).join('')}
              </div>
              <button class="btn-primary ${s.selectedOpt===null?'disabled':''}" onclick="submitAnswer()">Lock In My Answer →</button>
            ` : `
              <div class="waiting-card">
                <div class="check">✓</div>
                <div class="locked-msg">YOUR ANSWER IS LOCKED IN</div>
                ${!theyAnswered
                  ? `<div class="waiting-msg"><span class="dot"></span> Waiting for ${otherName || 'them'}...</div>`
                  : `<div class="both-msg">Both answered! Moving on...</div>`
                }
              </div>
            `}
          </div>
        </div>`;
    }

    else if (s.screen === 'reveal') {
      const answers = room?.answers || {};
      const hostName = room?.hostName || 'Host';
      const guestName = room?.guestName || 'Guest';
      let matches = 0, total = 0;
      const bycat = {};
      Object.values(answers).forEach(a => {
        if (!a.question) return;
        if (!bycat[a.cat]) bycat[a.cat] = [];
        bycat[a.cat].push(a);
        if (a.hostAnswer && a.guestAnswer) {
          total++;
          if (a.hostAnswer === a.guestAnswer) matches++;
        }
      });
      const pct = total > 0 ? Math.round((matches/total)*100) : null;
      const verdicts = [[80,"Dangerously compatible. 🔥"],[60,"More in common than most. Worth exploring."],[40,"Some overlap. The differences could be fun."],[0,"Opposites attract — or this is a warning sign."]];
      const verdict = pct !== null ? verdicts.find(([min]) => pct >= min)?.[1] : '';

      root.innerHTML = `
        <div class="reveal-wrap">
          <div class="reveal-header">
            <div class="eyebrow">✦ Results ✦</div>
            <div class="bigtitle">Here's What<br><em>You Found Out</em></div>
          </div>
          <div class="score-card">
            <div class="score-num">${pct !== null ? pct+'%' : '—'}</div>
            <div class="score-label">Compatibility Score</div>
            <div class="score-verdict">${verdict}</div>
          </div>
          ${Object.entries(bycat).map(([cat, items]) => `
            <div class="reveal-section">
              <div class="reveal-cat">${cat}</div>
              ${items.map(a => `
                <div class="reveal-item">
                  <div class="reveal-q">${a.question}</div>
                  <div class="reveal-answers">
                    ${a.hostAnswer ? `<div class="ans-box host"><div class="ans-name host-name">${hostName}</div><div class="ans-val">${a.hostAnswer}</div></div>` : ''}
                    ${a.guestAnswer ? `<div class="ans-box guest"><div class="ans-name guest-name">${guestName}</div><div class="ans-val">${a.guestAnswer}</div></div>` : ''}
                  </div>
                  ${a.hostAnswer && a.guestAnswer ? `<div class="match-badge ${a.hostAnswer===a.guestAnswer?'match':'no-match'}">${a.hostAnswer===a.guestAnswer?'✓ Match':'✗ Different'}</div>` : ''}
                </div>
              `).join('')}
            </div>
          `).join('')}
          <button class="btn-secondary" onclick="restart()">Play Again ↺</button>
        </div>`;
    }
  }

  // Expose to global
  window.createRoom = createRoom;
  window.joinRoom = joinRoom;
  window.submitAnswer = submitAnswer;
  window.selectOpt = selectOpt;
  window.setQCount = setQCount;
  window.restart = restart;
  window.state = state;

  render();
</script>
<style>
  :root {
    --bg: #0c0a10;
    --card: #16121c;
    --accent: #e8456a;
    --accent2: #ff8fa3;
    --gold: #f0c060;
    --text: #f0eaf4;
    --muted: #6a5a74;
    --border: #2a1f35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(232,69,106,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(240,192,96,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  #app { width: 100%; max-width: 500px; position: relative; z-index: 1; }
  .splash, .quiz-wrap, .reveal-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .reveal-wrap { max-width: 560px; }
  .eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .bigtitle { font-family: 'Playfair Display', serif; font-size: clamp(28px,7vw,44px); line-height: 1.15; font-style: italic; margin-bottom: 12px; }
  .bigtitle em { color: var(--accent); }
  .sub { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 28px; }
  .setup { display: flex; flex-direction: column; gap: 12px; }
  .section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .inp {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px; outline: none;
  }
  .inp:focus { border-color: var(--accent); }
  .inp::placeholder { color: var(--muted); }
  .row { display: flex; gap: 8px; }
  .cnt-btn {
    flex: 1; background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer;
    transition: all 0.15s;
  }
  .cnt-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,69,106,0.1); }
  .btn-primary {
    width: 100%; background: var(--accent); border: none; border-radius: 10px;
    padding: 15px; color: white; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { background: #f0617d; }
  .btn-primary.disabled { opacity: 0.4; cursor: default; }
  .btn-join {
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 20px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-join:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    margin-top: 16px; transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }
  .divider-text { text-align: center; font-size: 11px; color: var(--muted); }
  .error { color: #ff6b6b; font-size: 12px; text-align: center; }
  .code-inp { flex: 1; }
  .code-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 20px;
  }
  .code-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .big-code { font-family: 'Playfair Display', serif; font-size: 52px; font-style: italic; color: var(--gold); letter-spacing: 8px; }
  .waiting-msg { text-align: center; font-size: 12px; color: var(--muted); padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; transition: width 0.4s; }
  .quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .q-counter { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .cat-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(232,69,106,0.3); border-radius: 20px; padding: 3px 10px; }
  .question-card {}
  .q-text { font-family: 'Playfair Display', serif; font-size: clamp(16px,4vw,22px); line-height: 1.4; font-style: italic; margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .opt-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 16px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; text-align: left; cursor: pointer; display: flex;
    gap: 12px; line-height: 1.5; transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--accent); background: rgba(232,69,106,0.06); }
  .opt-btn.selected { border-color: var(--accent); background: rgba(232,69,106,0.12); color: var(--accent2); }
  .opt-label { color: var(--accent); min-width: 16px; flex-shrink: 0; }
  .other-inp {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--gold);
    color: var(--gold); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 6px 0; outline: none; margin-bottom: 8px;
  }
  .other-inp::placeholder { color: var(--muted); }
  .waiting-card { text-align: center; padding: 28px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; }
  .check { font-size: 28px; margin-bottom: 8px; }
  .locked-msg { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .both-msg { font-size: 12px; color: #50e3a4; }
  .reveal-header { text-align: center; margin-bottom: 24px; }
  .score-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 28px; }
  .score-num { font-family: 'Playfair Display', serif; font-size: 64px; font-style: italic; background: linear-gradient(135deg, var(--accent), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .score-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .score-verdict { font-family: 'Playfair Display', serif; font-size: 18px; font-style: italic; }
  .reveal-section { margin-bottom: 24px; }
  .reveal-cat { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .reveal-item { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 10px; }
  .reveal-q { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; color: var(--muted); margin-bottom: 12px; }
  .reveal-answers { display: flex; gap: 10px; flex-wrap: wrap; }
  .ans-box { flex: 1; min-width: 110px; border-radius: 8px; padding: 10px 12px; }
  .ans-box.host { background: rgba(232,69,106,0.08); border: 1px solid rgba(232,69,106,0.15); }
  .ans-box.guest { background: rgba(240,192,96,0.08); border: 1px solid rgba(240,192,96,0.15); }
  .ans-name { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .host-name { color: var(--accent); }
  .guest-name { color: var(--gold); }
  .ans-val { font-size: 12px; line-height: 1.4; }
  .match-badge { display: inline-block; font-size: 10px; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .match-badge.match { background: rgba(80,227,164,0.1); color: #50e3a4; border: 1px solid rgba(80,227,164,0.2); }
  .match-badge.no-match { background: rgba(232,69,106,0.1); color: var(--accent2); border: 1px solid rgba(232,69,106,0.2); }
</style>
</head>
<body>
<div id="app"></div>
</body>
</html>
